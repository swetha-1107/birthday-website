<!DOCTYPE html>
<html>
<head>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body {
    background: #f8c8dc;
    text-align: center;
    font-family: 'New Berolina', New Berolina;
    margin: 0;
    padding-top: 10px;
}

/* Romantic heading */
h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 60px;
    color: #c2185b;
    margin-bottom: 10px;
}

/* Subtitle */
p {
    font-size: 25px;
    color: #800040;
    margin-bottom: 20px;
}

/* IMAGE STYLE (ROUNDED FIX) */
.final-photo {
    width: 275px;
    border-radius: 20px;   /* ✅ smooth corners */
    box-shadow: 0px 8px 25px rgba(0,0,0,0.2);
    transition: 0.4s;
}

/* Hover effect */
.final-photo:hover {
    transform: scale(1.05);
}
</style>

</head>

<body>

<h1>My Forever Begins With You 💍</h1>

<p>In every lifetime, I will choose you again and again💖 Once again Happy Birthday My Babeee❤️✨</p> 
<p> I Love you so muchhh😘💖</p>

<!-- IMPORTANT: added class -->
<img src="photo10.jpg" class="final-photo">

</body>
</html>
